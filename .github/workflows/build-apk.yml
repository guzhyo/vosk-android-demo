name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Vosk models
        run: |
          # Download English small model
          echo "Downloading English model..."
          curl -sL "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" \
            -o /tmp/en-model.zip
          mkdir -p models/src/main/assets/model-en-us
          unzip -q /tmp/en-model.zip -d /tmp/en-model
          cp -r /tmp/en-model/vosk-model-small-en-us-0.15/* models/src/main/assets/model-en-us/
          echo "$(uuidgen)" > models/src/main/assets/model-en-us/uuid

          # Download Chinese small model
          echo "Downloading Chinese model..."
          curl -sL "https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip" \
            -o /tmp/cn-model.zip
          mkdir -p models/src/main/assets/vosk-model-small-cn
          unzip -q /tmp/cn-model.zip -d /tmp/cn-model
          cp -r /tmp/cn-model/vosk-model-small-cn-0.22/* models/src/main/assets/vosk-model-small-cn/
          echo "$(uuidgen)" > models/src/main/assets/vosk-model-small-cn/uuid

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Debug-APK
          path: "**/build/outputs/apk/debug/*.apk"
